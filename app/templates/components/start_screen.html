<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 neon-text">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold neon-text mb-2">Soc Ops</h1>
        <p class="text-lg neon-text mb-8 opacity-90">Social Bingo</p>

        <div class="panel-neon rounded-xl p-6 mb-8">
            <h2 class="font-semibold neon-text mb-3">How to play</h2>
            <ul class="text-left neon-text text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-neon font-semibold py-4 px-8 text-lg">
            Start Game
        </button>
    </div>
</div>
</div>
